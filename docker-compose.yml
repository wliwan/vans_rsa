# ═══════════════════════════════════════════════════════════════
# Vance Road Scanner Assistant Docker 一键部署
#
# 前置条件: Docker 17.05+
#
# 快速启动:
#   docker compose up -d
#
# 访问: http://localhost:9999
#   username: admin
#   password: 123456
#
# 常用命令:
#   docker compose up -d              # 后台启动
#   docker compose logs -f            # 查看日志
#   docker compose restart            # 重启服务
#   docker compose down               # 停止并删除容器
#   docker compose down -v            # 停止并删除容器+数据卷
#   docker compose build --no-cache   # 强制重新构建镜像
# ═══════════════════════════════════════════════════════════════

name: VansRSA

services:
  vansrsa:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_IMAGE=${NODE_IMAGE:-node:22-alpine}
        - PYTHON_IMAGE=${PYTHON_IMAGE:-python:3.11-slim-bullseye}
    pull_policy: build
    container_name: VansRSA
    ports:
      - "${APP_PORT:-1110}:80"
    volumes:
      - ./data:/opt/VansRSA/data
      - ./uploads:/opt/VansRSA/uploads
      - ./app/logs:/opt/VansRSA/app/logs
    environment:
      - TZ=Asia/Shanghai
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - vansrsa-net

networks:
  vansrsa-net:
    driver: bridge
