# ═══════════════════════════════════════════════════════════════
# Vue-FastAPI-Admin Docker 一键部署
#
# 前置条件: Docker 17.05+
#
# 快速启动:
#   docker compose up -d
#
# 访问: http://localhost:9999
#   username: admin
#   password: 123456
#
# 常用命令:
#   docker compose up -d              # 后台启动
#   docker compose logs -f            # 查看日志
#   docker compose restart            # 重启服务
#   docker compose down               # 停止并删除容器
#   docker compose down -v            # 停止并删除容器+数据卷（⚠️ 会删除数据库！）
#   docker compose build --no-cache   # 强制重新构建镜像
# ═══════════════════════════════════════════════════════════════

services:
  vue-fastapi-admin:
    build:
      context: .
      dockerfile: Dockerfile
    image: vue-fastapi-admin:latest
    container_name: vue-fastapi-admin
    ports:
      - "${APP_PORT:-9999}:80"
    volumes:
      # SQLite 数据库持久化（宿主机路径可改为绝对路径）
      - ./db.sqlite3:/opt/vue-fastapi-admin/db.sqlite3
      # 上传文件持久化
      - ./uploads:/opt/vue-fastapi-admin/uploads
      # 日志持久化（可选）
      - ./app/logs:/opt/vue-fastapi-admin/app/logs
    environment:
      - TZ=Asia/Shanghai
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - vfa-network

networks:
  vfa-network:
    driver: bridge
